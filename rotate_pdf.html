<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rotate PDF — PDF Manager</title><link rel="stylesheet" href="shared.css"/></head><body>
<header class="site-header"><div class="brand">PDF Manager <span>Open Vision</span></div></header>
<div class="page-wrap">
<div class="panel-header">
  <button class="panel-back" onclick="PDFMgr.goBack()">&larr; Back to Tools</button>
  <div class="panel-titles"><div class="panel-title">Rotate PDF</div><div class="panel-desc">Rotate all or specific pages in a PDF.</div></div>
</div>
<div class="card">
  <div class="card-title">Select PDF File</div>
  <div class="file-drop" id="rot-drop" ondragover="PDFMgr.dov(event,'rot-drop')" ondragleave="PDFMgr.dlv('rot-drop')" ondrop="PDFMgr.ddrop(event,'rot','rot-drop')">
    <input type="file" accept=".pdf" id="rot-file" onchange="PDFMgr.fchange('rot')"/>
    <div class="fd-icon"></div><div class="fd-text">Choose a PDF or drag and drop</div><div class="fd-sub">Only PDF</div>
    <div class="fname" id="rot-fname"></div><div class="fmeta" id="rot-fmeta"></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Rotation Settings</div>
  <div class="row2">
    <div class="field"><label class="lbl">Angle</label>
      <select id="rot-angle"><option value="90">90° Clockwise</option><option value="180">180° (Flip)</option><option value="270">90° Counter-Clockwise</option></select>
    </div>
    <div class="field"><label class="lbl">Apply To</label>
      <select id="rot-scope" onchange="toggleCustom(this.value)">
        <option value="all">All Pages</option><option value="odd">Odd Pages</option><option value="even">Even Pages</option><option value="custom">Custom Range</option>
      </select>
    </div>
  </div>
  <div class="field" id="custom-wrap" style="display:none"><label class="lbl">Custom Range (e.g. 1,3,5-8)</label><input type="text" id="rot-custom" placeholder="1,3,5-8"/></div>
  <button class="btn btn-primary btn-full" onclick="doRotate()">Rotate PDF</button>
  <div class="alert alert-err" id="rot-err"></div>
  <div class="prog-wrap" id="rot-prog"><div class="prog-lbl">Rotating...</div><div class="prog-bar"><div class="prog-fill" id="rot-fill"></div></div></div>
  <div class="result-wrap" id="rot-result"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="shared.js"></script>
<script>
function toggleCustom(v){document.getElementById('custom-wrap').style.display=v==='custom'?'block':'none';}
async function doRotate(){
  PDFMgr.hideErr('rot');
  const f=PDFMgr.getFile('rot');if(!f)return PDFMgr.showErr('rot','Please select a PDF.');
  const angle=parseInt(document.getElementById('rot-angle').value);
  const scope=document.getElementById('rot-scope').value;
  try{
    PDFMgr.setProgress('rot',30,'Loading...');
    const ab=await PDFMgr.readFile(f);
    const doc=await PDFLib.PDFDocument.load(ab);
    const total=doc.getPageCount();
    let idxs=[];
    if(scope==='all'){for(let i=0;i<total;i++)idxs.push(i);}
    else if(scope==='odd'){for(let i=0;i<total;i+=2)idxs.push(i);}
    else if(scope==='even'){for(let i=1;i<total;i+=2)idxs.push(i);}
    else{idxs=PDFMgr.parsePageRange(document.getElementById('rot-custom').value,total);if(!idxs.length)return PDFMgr.showErr('rot','No valid pages.');}
    PDFMgr.setProgress('rot',60,'Rotating...');
    idxs.forEach(i=>{const p=doc.getPage(i);p.setRotation(PDFLib.degrees((p.getRotation().angle+angle)%360));});
    PDFMgr.setProgress('rot',88,'Saving...');
    const out=await doc.save();
    PDFMgr.hideProgress('rot');
    PDFMgr.showResult('rot',PDFMgr.dlCard(PDFMgr.baseName(f)+'_rotated.pdf',out.byteLength,PDFMgr.makeDlUrl(out,'application/pdf'),idxs.length+' pages rotated '+angle+'°'));
  }catch(e){PDFMgr.hideProgress('rot');PDFMgr.showErr('rot',e.message||'Failed.');}
}
</script></body></html>
