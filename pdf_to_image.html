<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF to Image — PDF Manager</title><link rel="stylesheet" href="shared.css"/></head><body>
<header class="site-header"><div class="brand">PDF Manager <span>Open Vision</span></div></header>
<div class="page-wrap">
<div class="panel-header">
  <a class="panel-back" href="index.html">&larr; Back</a>
  <div class="panel-titles"><div class="panel-title">PDF to Image</div><div class="panel-desc">Export each PDF page as a PNG or JPEG image.</div></div>
</div>
<div class="card">
  <div class="card-title">Select PDF File</div>
  <div class="file-drop" id="p2i-drop" ondragover="PDFMgr.dov(event,'p2i-drop')" ondragleave="PDFMgr.dlv('p2i-drop')" ondrop="PDFMgr.ddrop(event,'p2i','p2i-drop')">
    <input type="file" accept=".pdf" id="p2i-file" onchange="PDFMgr.fchange('p2i')"/>
    <div class="fd-icon">&#128196;</div><div class="fd-text">Choose a PDF or drag and drop</div><div class="fd-sub">Only PDF accepted</div>
    <div class="fname" id="p2i-fname"></div><div class="fmeta" id="p2i-fmeta"></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Options</div>
  <div class="row2">
    <div class="field"><label class="lbl">Format</label><select id="p2i-fmt"><option value="png">PNG (Best Quality)</option><option value="jpeg">JPEG (Smaller Size)</option></select></div>
    <div class="field"><label class="lbl">Scale</label><select id="p2i-scale"><option value="1">96 DPI</option><option value="1.5">144 DPI</option><option value="2" selected>192 DPI</option><option value="3">288 DPI</option></select></div>
  </div>
  <div class="field"><label class="lbl">Pages</label>
    <select id="p2i-pages" onchange="document.getElementById('p2i-cw').style.display=this.value==='custom'?'block':'none'">
      <option value="all">All Pages</option><option value="first">First Page Only</option><option value="custom">Custom Range</option>
    </select>
  </div>
  <div class="field" id="p2i-cw" style="display:none"><label class="lbl">Page Range (e.g. 1-3)</label><input type="text" id="p2i-custom" placeholder="e.g. 1-3"/></div>
  <button class="btn btn-primary btn-full" onclick="doConvert()">Convert</button>
  <div class="alert alert-err" id="p2i-err"></div>
  <div class="alert alert-info show">Note: PDF rendering uses the browser built-in PDF.js engine.</div>
  <div class="prog-wrap" id="p2i-prog"><div class="prog-lbl" id="p2i-plbl">Processing...</div><div class="prog-bar"><div class="prog-fill" id="p2i-fill"></div></div></div>
  <div class="result-wrap" id="p2i-result"></div>
</div>
</div>
<footer class="site-footer"></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="shared.js"></script>
<script>
async function doConvert(){
  PDFMgr.hideErr('p2i');
  const f=PDFMgr.getFile('p2i');if(!f)return PDFMgr.showErr('p2i','Please select a PDF.');
  const fmt=document.getElementById('p2i-fmt').value;
  const scale=parseFloat(document.getElementById('p2i-scale').value);
  const scope=document.getElementById('p2i-pages').value;
  try{
    PDFMgr.setProgress('p2i',10,'Loading PDF...');
    const ab=await PDFMgr.readFile(f);
    const src=await PDFLib.PDFDocument.load(ab);
    const total=src.getPageCount();
    let pages=[];
    if(scope==='all'){for(let i=0;i<total;i++)pages.push(i);}
    else if(scope==='first'){pages=[0];}
    else{pages=PDFMgr.parsePageRange(document.getElementById('p2i-custom').value,total);}
    if(!pages.length)return PDFMgr.showErr('p2i','No valid pages.');
    await PDFMgr.loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdfDoc=await window.pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
    const mime=fmt==='jpeg'?'image/jpeg':'image/png';
    const ext=fmt==='jpeg'?'jpg':'png';
    let cards='';
    for(let idx=0;idx<pages.length;idx++){
      document.getElementById('p2i-plbl').textContent='Rendering page '+(pages[idx]+1)+' of '+total+'...';
      PDFMgr.setProgress('p2i',10+Math.round(idx/pages.length*85));
      const page=await pdfDoc.getPage(pages[idx]+1);
      const vp=page.getViewport({scale});
      const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
      await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
      const blob=await new Promise(r=>cv.toBlob(r,mime,fmt==='jpeg'?0.92:undefined));
      const name=PDFMgr.baseName(f)+'_page'+(pages[idx]+1)+'.'+ext;
      cards+=PDFMgr.dlCard(name,blob.size,URL.createObjectURL(blob),'Page '+(pages[idx]+1));
    }
    PDFMgr.hideProgress('p2i');
    PDFMgr.showResult('p2i',cards);
  }catch(e){PDFMgr.hideProgress('p2i');PDFMgr.showErr('p2i',e.message||'Failed.');}
}
</script></body></html>
