<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compress — PDF Manager</title><link rel="stylesheet" href="shared.css"/></head><body>
<header class="site-header"><div class="brand">PDF Manager <span>Open Vision</span></div></header>
<div class="page-wrap">
<div class="panel-header">
  <a class="panel-back" href="index.html">&larr; Back</a>
  <div class="panel-titles"><div class="panel-title">Compress PDF &amp; Images</div><div class="panel-desc">Reduce file size of PDFs and images.</div></div>
</div>
<div class="card">
  <div class="card-title">Select File</div>
  <div class="file-drop" id="cmp-drop" ondragover="PDFMgr.dov(event,'cmp-drop')" ondragleave="PDFMgr.dlv('cmp-drop')" ondrop="PDFMgr.ddrop(event,'cmp','cmp-drop')">
    <input type="file" accept=".pdf,image/*" id="cmp-file" onchange="PDFMgr.fchange('cmp')"/>
    <div class="fd-icon">&#128196;</div><div class="fd-text">Choose a PDF or Image file</div><div class="fd-sub">PDF, PNG, JPEG, WebP</div>
    <div class="fname" id="cmp-fname"></div><div class="fmeta" id="cmp-fmeta"></div>
  </div>
</div>
<div class="card">
  <div class="card-title">Compression Settings</div>
  <div class="field"><label class="lbl">Compression Level</label>
    <select id="cmp-level" onchange="document.getElementById('custom-wrap').style.display=this.value==='custom'?'block':'none'">
      <option value="0.05">Extreme (Smallest Size)</option>
      <option value="0.1">Aggressive (Maximum Compression)</option>
      <option value="0.3">Low (Good Compression)</option>
      <option value="0.5" selected>Medium (Recommended)</option>
      <option value="0.7">High (Better Visuals)</option>
      <option value="0.9">Best (Largest Size, Best Visuals)</option>
      <option value="custom">Custom Target Size</option>
    </select>
  </div>
  <div class="field" id="custom-wrap" style="display:none"><label class="lbl">Target Size (KB, approximate)</label><input type="number" id="cmp-target" min="10" placeholder="e.g. 500"/></div>
  <button class="btn btn-primary btn-full" onclick="doCompress()">Confirm &amp; Compress</button>
  <div class="alert alert-err" id="cmp-err"></div>
  <div class="prog-wrap" id="cmp-prog"><div class="prog-lbl">Compressing...</div><div class="prog-bar"><div class="prog-fill" id="cmp-fill"></div></div></div>
  <div class="result-wrap" id="cmp-result"></div>
</div>
</div>
<footer class="site-footer"></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="shared.js"></script>
<script>
function loadImg(src){return new Promise((r,j)=>{const i=new Image();i.onload=()=>r(i);i.onerror=j;i.src=src;});}
async function doCompress(){
  PDFMgr.hideErr('cmp');
  const f=PDFMgr.getFile('cmp');if(!f)return PDFMgr.showErr('cmp','Please select a file.');
  const lvl=document.getElementById('cmp-level').value;
  const quality=lvl==='custom'?0.5:parseFloat(lvl);
  try{
    PDFMgr.setProgress('cmp',20,'Reading file...');
    if(f.type.startsWith('image/')){
      const url=URL.createObjectURL(f);
      const img=await loadImg(url);
      const cv=document.createElement('canvas');cv.width=img.naturalWidth;cv.height=img.naturalHeight;
      cv.getContext('2d').drawImage(img,0,0);
      PDFMgr.setProgress('cmp',60,'Compressing...');
      const mime=quality<0.4?'image/jpeg':(f.type==='image/png'?'image/png':'image/jpeg');
      const blob=await new Promise(r=>cv.toBlob(r,mime,quality));
      PDFMgr.hideProgress('cmp');
      const ratio=((1-blob.size/f.size)*100).toFixed(1);
      const ext=mime==='image/png'?'png':'jpg';
      PDFMgr.showResult('cmp',PDFMgr.dlCard(PDFMgr.baseName(f)+'_compressed.'+ext,blob.size,URL.createObjectURL(blob),ratio+'% reduction'));
    }else{
      const ab=await PDFMgr.readFile(f);
      const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
      PDFMgr.setProgress('cmp',65,'Optimizing PDF...');
      const out=await doc.save({useObjectStreams:true});
      PDFMgr.hideProgress('cmp');
      const ratio=((1-out.byteLength/f.size)*100).toFixed(1);
      PDFMgr.showResult('cmp',PDFMgr.dlCard(PDFMgr.baseName(f)+'_compressed.pdf',out.byteLength,PDFMgr.makeDlUrl(out,'application/pdf'),ratio>0?ratio+'% reduction':'optimized'));
    }
  }catch(e){PDFMgr.hideProgress('cmp');PDFMgr.showErr('cmp',e.message||'Failed.');}
}
</script></body></html>
